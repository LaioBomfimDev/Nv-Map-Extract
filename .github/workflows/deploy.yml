# A publicacao em producao e feita pela integracao nativa da Vercel com o
# repositorio. Este workflow apenas valida o codigo (instala, lint, testa
# e builda o frontend) a cada push/PR.
name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: |
          frontend/package-lock.json
          backend/package-lock.json
    
    - name: Install Backend Dependencies
      run: |
        cd backend
        npm ci
    
    - name: Install Frontend Dependencies
      run: |
        cd frontend
        npm ci
    
    - name: Lint Backend
      run: |
        cd backend
        npm run lint || echo "Lint not configured"
    
    - name: Lint Frontend
      run: |
        cd frontend
        npm run lint || echo "Lint not configured"
    
    - name: Test Backend
      run: |
        cd backend
        npm test || echo "Tests not configured"
    
    - name: Test Frontend
      run: |
        cd frontend
        npm test -- --coverage --watchAll=false || echo "Tests not configured"
    
    - name: Build Frontend
      run: |
        cd frontend
        npm run build
      env:
        REACT_APP_API_URL: ${{ secrets.REACT_APP_API_URL }}
        REACT_APP_NAME: Friendly Miner Dashboard
        REACT_APP_VERSION: 1.0.0