name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Baixar o repositório
        uses: actions/checkout@v4

      - name: Preparar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Instalar frontend
        working-directory: frontend
        run: npm ci

      - name: Lint
        working-directory: frontend
        run: npm run lint

      - name: Testes
        working-directory: frontend
        run: npm test -- --watchAll=false

      - name: Build de produção
        working-directory: frontend
        run: npm run build

      - name: Validar artefato da extensão
        run: node scripts/release-extension.mjs --validate
