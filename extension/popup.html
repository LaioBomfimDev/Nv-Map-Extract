<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8" />
    <title>Friendly Miner Extractor</title>
    <link href="css/style.css" rel="stylesheet" />
</head>
<body>
    <!-- Cabeçalho -->
    <div class="popup-header">
        <div class="popup-logo">⛏️</div>
        <div>
            <div class="popup-title">Friendly Miner Extractor</div>
            <div class="popup-sub">by Friendly Miner Dashboard</div>
        </div>
    </div>

    <div class="popup-body">

        <!-- Busca rápida -->
        <div class="input-group">
            <div class="section-label">🔍 Busca Rápida no Google Maps</div>
            <input
                type="text"
                id="searchInput"
                class="input-field"
                placeholder="ex: dentistas em São Paulo"
                value=""
            />
        </div>
        <button id="btnSearch" class="btn-search">Abrir no Google Maps</button>

        <hr class="divider" />

        <!-- Status da conta -->
        <div>
            <div class="section-label">👤 Sua conta</div>
            <div class="status-indicator">
                <div class="status-dot" id="statusDot"></div>
                <span id="statusText">Verificando...</span>
            </div>
            <button id="btnPanel" class="btn-save" style="margin-top:10px;">🌐 Abrir Painel / Entrar</button>
            <div class="url-hint" id="loginHint" style="margin-top:8px;">
                Faça login no painel uma vez. Depois é só minerar no Maps que os leads
                vão direto para a sua conta.
            </div>
        </div>

    </div>

    <div class="footer">
        Friendly Miner Dashboard — Inteligência de Leads
    </div>

    <script src="config.js"></script>
    <script src="js/popup.js"></script>
</body>
</html>
